{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <h2>Register</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p class="auth-flash auth-flash-{{ category }}">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="post" action="{{ url_for('auth.register') }}" class="auth-form">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" name="username" required autocomplete="username" maxlength="32"
               pattern="[a-zA-Z0-9_-]{2,32}" title="2–32 characters: letters, numbers, underscore, hyphen">

        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" required autocomplete="new-password" minlength="8">

        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password" minlength="8">

        <button type="submit" class="auth-submit">Create account</button>
    </form>
    <p class="auth-alt">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
