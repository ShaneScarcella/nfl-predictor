{% extends "base.html" %}

{% block content %}
    <nav class="tab-nav">
        <button class="tab-button active" onclick="showTab('ai-model')">AI Model</button>
        <button class="tab-button" onclick="showTab('custom-engine')">Custom Engine</button>
        <button class="tab-button" onclick="showTab('sos-analysis')">SoS Analysis</button>
        <button class="tab-button" onclick="showTab('leaderboard')">Leaderboard</button>
    </nav>

    <div class="sticky-filters">
        <div class="sticky-filters-inner">
            <label for="season-select">Season</label>
            <select id="season-select" onchange="handleSeasonChange()"></select>
            <label for="week-select">Week</label>
            <select id="week-select" onchange="onWeekChange()"></select>
        </div>
    </div>

    {% include 'tabs/ai_model.html' %}
    {% include 'tabs/custom_engine.html' %}
    {% include 'tabs/sos_analysis.html' %}
    {% include 'tabs/leaderboard.html' %}
{% endblock %}
