{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <h2>Log in</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p class="auth-flash auth-flash-{{ category }}">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
        <label for="username">Username</label>
        <input type="text" id="login-username" name="username" required autocomplete="username" maxlength="32">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <label class="auth-checkbox">
            <input type="checkbox" name="remember" value="1">
            Stay signed in on this device
        </label>

        <button type="submit" class="auth-submit">Log in</button>
    </form>
    <p class="auth-alt">No account? <a href="{{ url_for('auth.register') }}">Register</a></p>
</div>
{% endblock %}
