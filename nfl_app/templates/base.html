<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Predictor Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>
<body>
    <button type="button" id="chat-drawer-toggle" class="chat-drawer-toggle" aria-expanded="false" aria-controls="community-chat-sidebar">
        <span class="chat-drawer-toggle-icon" aria-hidden="true"></span>
        <span class="chat-drawer-toggle-text">Chat</span>
    </button>
    <div id="chat-backdrop" class="chat-backdrop" aria-hidden="true"></div>

    <div class="app-shell">
        <main class="app-main">
            <div class="container">
                <header>
                    <h1>NFL Predictor Pro</h1>
                    <div class="user-identity">
                        <label for="username">Your Name:</label>
                        <input type="text" id="username" placeholder="Enter name to save picks" onchange="saveUsername()">
                    </div>
                </header>

                {% block content %}{% endblock %}
            </div>
        </main>

        {% include 'partials/chat_sidebar.html' %}
    </div>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
